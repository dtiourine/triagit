{% extends "base.html" %}
{% block title %}Error — codescope{% endblock %}

{% block content %}
<div class="cs-error">
  <div class="cs-error-card">
    <div class="cs-error-tag mono">error</div>
    <h2 class="cs-error-h">{{ title }}</h2>
    <p class="cs-error-p">{{ message }}</p>
    {% if slug %}
    <div class="cs-error-slug mono">{{ slug }}</div>
    {% endif %}
    <a href="/" class="cs-btn cs-btn-primary">Try again</a>
  </div>
</div>
{% endblock %}
