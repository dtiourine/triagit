{% extends "base.html" %}
{% block title %}Error — triagit{% endblock %}

{% block content %}
<div class="t-error">
  <div class="t-error-card">
    <div class="t-error-tag mono">error</div>
    <h2 class="t-error-h">{{ title }}</h2>
    <p class="t-error-p">{{ message }}</p>
    {% if slug %}
    <div class="t-error-slug mono">{{ slug }}</div>
    {% endif %}
    <a href="/" class="t-btn t-btn-primary">Try again</a>
  </div>
</div>
{% endblock %}
