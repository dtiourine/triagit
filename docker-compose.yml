services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reposense
      POSTGRES_PASSWORD: reposense_dev
      POSTGRES_DB: reposense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reposense"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://reposense:reposense_dev@postgres:5432/reposense
      REDIS_URL: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./src:/app/src
    environment:
      DATABASE_URL: postgresql+asyncpg://reposense:reposense_dev@postgres:5432/reposense
      REDIS_URL: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: